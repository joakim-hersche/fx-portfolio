# fly.toml app configuration file generated for market-dashboard-winter-paper-9157 on 2026-03-19T11:23:52+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'market-dashboard-currency-adjusted'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  # Fly caps http_service grace_period at 60s regardless of what is set here.
  # Setting it explicitly to 60s so configured value matches effective value.
  grace_period = "60s"
  interval = "10s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
